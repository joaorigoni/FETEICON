<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Icon. — Fête de la musique</title>
<!-- EmailJS SDK -->
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #fff;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-weight: 400;
    color: #000;
    overflow-x: hidden;
  }

  /* ── CLOCK — fixed, huge, centered, bleeds off edges ── */
  #clock-bg {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    z-index: 0;
  }

  /* ── PAGE GRID ── */
  .page {
    position: relative;
    z-index: 10;
    min-height: 100vh;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1fr;
    grid-template-rows: auto 1fr auto;
    padding: 20px;
    gap: 0;
  }

  /* ── TOP ROW ── */
  .top-brand {
    grid-column: 1;
    grid-row: 1;
    display: flex;
    flex-direction: column;
    line-height: 1.2;
    padding-bottom: 0;
  }
  /* 4× de 13px = 52px, mesmo peso visual */
  .brand-icon {
    font-size: 52px;
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1;
  }
  .brand-presents {
    font-size: 52px;
    font-weight: 400;
    letter-spacing: -0.02em;
    line-height: 1;
  }
  .brand-fest {
    font-size: 52px;
    font-weight: 400;
    letter-spacing: -0.02em;
    line-height: 1;
  }

  .top-counter {
    display: none;
  }

  /* Counter floated over clock center */
  .clock-counter {
    grid-column: 3;
    grid-row: 2;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    letter-spacing: 0.06em;
    font-variant-numeric: tabular-nums;
    pointer-events: none;
    z-index: 20;
    position: relative;
  }

  .top-right {
    grid-column: 4;
    grid-row: 1;
    font-size: 13px;
    align-self: start;
    text-align: right;
    padding-top: 6px;
  }

  /* ── MIDDLE ROW — vertically centered in viewport ── */
  .mid-left {
    grid-column: 1;
    grid-row: 2;
    display: flex;
    align-items: center; /* vertically centered */
  }
  .days-left {
    font-size: 13px;
    font-weight: 700;
  }

  /* "Together as one" — centered in col 2, aligns with clock center */
  .mid-center {
    grid-column: 2;
    grid-row: 2;
    display: flex;
    align-items: center;
    justify-content: flex-start;
  }
  .tagline {
    font-size: 13px;
    font-weight: 400;
  }

  /* col 3 — clock ghost */
  .mid-clock-ghost {
    grid-column: 3;
    grid-row: 2;
    pointer-events: none;
  }

  /* form col — aligned to bottom, same as left/center bottom text */
  .mid-form {
    grid-column: 4;
    grid-row: 2;
    display: flex;
    align-items: center;
    justify-content: flex-end;
  }
  .form-guest {
    font-size: 13px;
    font-weight: 400;
  }

  /* ── BOTTOM ROW ── */
  .bot-left {
    grid-column: 1;
    grid-row: 3;
    padding-top: 24px;
  }
  .presents-label { font-size: 12px; margin-bottom: 3px; }
  .presents-label strong { font-weight: 700; }
  .fest-name { font-size: 12px; font-weight: 700; margin-bottom: 16px; }
  .artists { list-style: none; }
  .artists li { margin-bottom: 2px; }
  .artists a {
    font-size: 12px;
    font-weight: 400;
    color: #000;
    text-decoration: none;
  }
  .artists a:hover { font-weight: 700; }

  .bot-venue {
    grid-column: 2;
    grid-row: 3;
    padding-top: 24px;
  }
  .venue-name { font-size: 12px; font-weight: 700; margin-bottom: 6px; }
  .venue-addr { font-size: 12px; line-height: 1.7; }

  /* col 3 bottom — empty */
  .bot-empty {
    grid-column: 3;
    grid-row: 3;
    pointer-events: none;
  }

  /* FORM — bottom row, aligns with bot-left and bot-venue */
  .bot-form {
    grid-column: 4;
    grid-row: 3;
    padding-top: 24px;
    display: flex;
    flex-direction: column;
  }

  .form-group { margin-bottom: 18px; }
  .form-group input {
    width: 100%;
    border: none;
    border-bottom: 1px solid #ccc;
    outline: none;
    font-size: 12px;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-weight: 400;
    color: #000;
    padding: 4px 0 7px;
    background: transparent;
  }
  .form-group input::placeholder { color: #aaa; }
  .form-group input:focus { border-bottom-color: #000; }

  .submit-btn {
    border: 1px solid #000;
    background: transparent;
    font-size: 12px;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    color: #000;
    padding: 7px 18px;
    cursor: pointer;
    border-radius: 20px;
    align-self: flex-start;
    transition: background 0.15s, color 0.15s;
    margin-top: 4px;
  }
  .submit-btn:hover { background: #000; color: #fff; }
  .submit-btn:disabled { opacity: 0.45; cursor: not-allowed; }

  .form-msg {
    font-size: 11px;
    margin-top: 10px;
    color: #555;
    min-height: 14px;
  }
</style>
</head>
<body>

<!-- CLOCK canvas — fixed behind everything -->
<div id="clock-bg">
  <canvas id="clock"></canvas>
</div>

<div class="page">

  <!-- TOP ROW -->
  <div class="top-brand">
    <div class="brand-icon">Icon.</div>
    <div class="brand-presents">presents</div>
    <div class="brand-fest">Fête de la musique</div>
  </div>
  <div></div><!-- col 2 spacer -->
  <div></div><!-- col 3 spacer -->
  <div class="top-right">Fête de la musique</div>


  <!-- MIDDLE ROW -->
  <div class="mid-left">
    <div class="days-left" id="days-left">-- days left</div>
  </div>
  <div class="mid-center">
    <div class="tagline">Together as one</div>
  </div>
  <div class="clock-counter" id="counter">D-- H-- S--</div>
  <div class="mid-form">
    <div class="form-guest">You are our special guest.</div>
  </div>

  <!-- BOTTOM ROW -->
  <div class="bot-left">
    <div class="presents-label"><strong>Icon.</strong> presents</div>
    <div class="fest-name">Fête de la musique</div>
    <ul class="artists">
      <li><a href="https://www.instagram.com/henyanni/"          target="_blank" rel="noopener">Hen Yanni</a></li>
      <li><a href="https://www.instagram.com/harrisonfirst/"     target="_blank" rel="noopener">Harrison First</a></li>
      <li><a href="https://www.instagram.com/sidsimonsofficial/" target="_blank" rel="noopener">Sid Simmons</a></li>
      <li><a href="https://www.instagram.com/kidsreturn_/"       target="_blank" rel="noopener">Kids Return</a></li>
    </ul>
  </div>

  <div class="bot-venue">
    <div class="venue-name">FCC Paris</div>
    <div class="venue-addr">21 Rue Étienne Marcel, 75001<br>Paris/France</div>
  </div>

  <div class="bot-empty"></div>

  <div class="bot-form">
    <div class="form-group"><input type="text"  id="f-name"  placeholder="Name"   autocomplete="off"></div>
    <div class="form-group"><input type="email" id="f-email" placeholder="E-mail" autocomplete="off"></div>
    <div class="form-group"><input type="tel"   id="f-phone" placeholder="Phone"  autocomplete="off"></div>
    <button class="submit-btn" id="submit-btn">Confirmer la présence</button>
    <div class="form-msg" id="form-msg"></div>
  </div>

</div><!-- /page -->

<script>
// ── EMAILJS INIT ─────────────────────────────────────────
// Public key do EmailJS (gratuito, sem backend)
emailjs.init('user_PLACEHOLDER'); // será substituído pela chave pública do usuário

// ── TARGET ──────────────────────────────────────────────
const TARGET = new Date('2026-06-21T14:00:00+02:00');
function pad(n){ return String(Math.max(0,Math.floor(n))).padStart(2,'0'); }

function getDiff(){
  const ms    = Math.max(0, TARGET - Date.now());
  const total = ms / 1000;
  return {
    days : Math.floor(total / 86400),
    hrs  : Math.floor((total % 86400) / 3600),
    mins : Math.floor((total % 3600) / 60),
    secs : Math.floor(total % 60),
  };
}

// ── COUNTER ──────────────────────────────────────────────
const counterEl  = document.getElementById('counter');
const daysLeftEl = document.getElementById('days-left');

function updateCounter(){
  const { days, hrs, secs } = getDiff();
  counterEl.textContent  = `D${pad(days)} H${pad(hrs)} S${pad(secs)}`;
  daysLeftEl.textContent = `${days} days left`;
}
updateCounter();
setInterval(updateCounter, 1000);

// ── CLOCK ────────────────────────────────────────────────
const canvas = document.getElementById('clock');
const ctx    = canvas.getContext('2d');

function sizeCanvas(){
  const sz = Math.max(window.innerWidth, window.innerHeight) * 1.4;
  canvas.width = canvas.height = sz;
}
sizeCanvas();
window.addEventListener('resize', sizeCanvas);

function drawClock(){
  const sz = canvas.width;
  ctx.clearRect(0, 0, sz, sz);
  const cx = sz / 2, cy = sz / 2;
  const outerR = sz * 0.46;

  // Ring
  ctx.beginPath();
  ctx.arc(cx, cy, outerR, 0, Math.PI*2);
  ctx.strokeStyle = 'rgba(0,0,0,0.10)';
  ctx.lineWidth = 1;
  ctx.stroke();

  // Tick marks
  for(let i=0; i<60; i++){
    const a = (i/60)*Math.PI*2 - Math.PI/2;
    const major = i % 5 === 0;
    ctx.beginPath();
    ctx.moveTo(cx + Math.cos(a)*outerR*(major?0.93:0.97),
               cy + Math.sin(a)*outerR*(major?0.93:0.97));
    ctx.lineTo(cx + Math.cos(a)*outerR,
               cy + Math.sin(a)*outerR);
    ctx.strokeStyle = major ? 'rgba(0,0,0,0.30)' : 'rgba(0,0,0,0.10)';
    ctx.lineWidth   = major ? 1 : 0.5;
    ctx.stroke();
  }

  // Counter-driven hands — HOUR and SECOND only
  const { hrs, mins, secs } = getDiff();
  const now   = Date.now();
  const msec  = now % 1000;

  // Seconds — full sweep per 60s, smooth
  const secAngle = ((secs + msec/1000)/60)*Math.PI*2 - Math.PI/2;
  // Hours (remaining) — full sweep per 24h, smooth with mins
  const hrAngle  = ((hrs%24)/24 + mins/1440)*Math.PI*2 - Math.PI/2;

  function hand(angle, len, w, alpha, tail=0){
    ctx.beginPath();
    ctx.moveTo(cx - Math.cos(angle)*tail, cy - Math.sin(angle)*tail);
    ctx.lineTo(cx + Math.cos(angle)*len,  cy + Math.sin(angle)*len);
    ctx.strokeStyle = `rgba(0,0,0,${alpha})`;
    ctx.lineWidth = w;
    ctx.lineCap = 'round';
    ctx.stroke();
  }

  hand(hrAngle,  outerR*0.60, 1.0, 0.55, outerR*0.05);
  hand(secAngle, outerR*0.86, 0.7, 1.00, outerR*0.07);

  // Center dot
  ctx.beginPath();
  ctx.arc(cx, cy, 2.5, 0, Math.PI*2);
  ctx.fillStyle = '#000';
  ctx.fill();
}

drawClock();
setInterval(drawClock, 50);

// ── FORM — envio direto via EmailJS ─────────────────────
// Para ativar: crie conta grátis em emailjs.com,
// crie um Email Service + Template, e substitua as 3 chaves abaixo.
const EMAILJS_SERVICE  = 'service_PLACEHOLDER';
const EMAILJS_TEMPLATE = 'template_PLACEHOLDER';

document.getElementById('submit-btn').addEventListener('click', async () => {
  const name  = document.getElementById('f-name').value.trim();
  const email = document.getElementById('f-email').value.trim();
  const phone = document.getElementById('f-phone').value.trim();
  const msgEl = document.getElementById('form-msg');
  const btn   = document.getElementById('submit-btn');

  if(!name || !email){
    msgEl.textContent = 'Please fill in your name and e-mail.';
    msgEl.style.color = '#c00';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Sending…';
  msgEl.textContent = '';

  try {
    await emailjs.send(EMAILJS_SERVICE, EMAILJS_TEMPLATE, {
      from_name  : name,
      from_email : email,
      phone      : phone || '—',
      to_email   : 'rigoni@weareicon.co, contato@weareicon.co',
      event_name : 'Fête de la musique — 21/06/2026',
    });
    msgEl.textContent = 'Présence confirmée — merci !';
    msgEl.style.color = '#555';
    document.getElementById('f-name').value  = '';
    document.getElementById('f-email').value = '';
    document.getElementById('f-phone').value = '';
    btn.textContent = 'Confirmer la présence';
    btn.disabled = false;
  } catch(err) {
    // Fallback: abrir cliente de e-mail se EmailJS não estiver configurado
    const body = `Name: ${name}\nE-mail: ${email}\nPhone: ${phone}`;
    const ml   = `mailto:rigoni@weareicon.co,contato@weareicon.co`
               + `?subject=${encodeURIComponent('RSVP — Fête de la musique')}`
               + `&body=${encodeURIComponent(body)}`;
    window.location.href = ml;
    msgEl.textContent = 'Opening your email client as fallback.';
    msgEl.style.color = '#999';
    btn.textContent = 'Confirmer la présence';
    btn.disabled = false;
  }
});
</script>
</body>
</html>
