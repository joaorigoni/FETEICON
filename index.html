<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Icon. — Fête de la musique</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #fff;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    color: #000;
    overflow: hidden;
  }

  #clock-bg {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    z-index: 0;
  }

  .page {
    position: relative;
    z-index: 10;
    width: 100vw;
    height: 100vh;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1.2fr;
    grid-template-rows: auto 1fr auto;
    padding: 20px 80px 20px 24px;
  }

  /* TOP */
  .top-brand { grid-column:1; grid-row:1; line-height:1.05; }
  .brand-icon     { font-size:42px; font-weight:700; letter-spacing:-0.02em; line-height:1; }
  .brand-presents { font-size:52px; font-weight:400; letter-spacing:-0.02em; line-height:1; }
  .brand-fest     { font-size:52px; font-weight:400; letter-spacing:-0.02em; line-height:1; }

  .top-right { grid-column:4; grid-row:1; font-size:13px; text-align:right; padding-top:6px; white-space:nowrap; }

  /* MIDDLE */
  .mid-left   { grid-column:1; grid-row:2; display:flex; align-items:center; }
  .days-left  { font-size:13px; font-weight:700; white-space:nowrap; }

  .mid-center { grid-column:2; grid-row:2; display:flex; align-items:center; }
  .tagline    { font-size:13px; white-space:nowrap; }

  .mid-counter { grid-column:3; grid-row:2; display:flex; align-items:center; justify-content:center; font-size:12px; letter-spacing:0.06em; font-variant-numeric:tabular-nums; white-space:nowrap; z-index:20; }

  .mid-form   { grid-column:4; grid-row:2; display:flex; align-items:center; justify-content:flex-end; }
  .form-guest { font-size:13px; white-space:nowrap; }

  /* BOTTOM */
  .bot-left  { grid-column:1; grid-row:3; padding-top:20px; }
  .presents-label { font-size:12px; margin-bottom:3px; }
  .fest-name { font-size:12px; font-weight:700; margin-bottom:14px; }
  .artists   { list-style:none; }
  .artists li { margin-bottom:2px; }
  .artists a  { font-size:12px; color:#000; text-decoration:none; }
  .artists a:hover { font-weight:700; }

  .bot-venue { grid-column:2; grid-row:3; padding-top:20px; }
  .venue-name { font-size:12px; font-weight:700; margin-bottom:6px; }
  .venue-addr { font-size:12px; line-height:1.7; }

  .bot-form  { grid-column:4; grid-row:3; padding-top:20px; display:flex; flex-direction:column; }
  .form-group { margin-bottom:14px; }
  .form-group input {
    width:100%; border:none; border-bottom:1px solid #ccc;
    outline:none; font-size:12px;
    font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;
    color:#000; padding:3px 0 6px; background:transparent;
  }
  .form-group input::placeholder { color:#aaa; }
  .form-group input:focus { border-bottom-color:#000; }
  .submit-btn {
    border:1px solid #000; background:transparent;
    font-size:12px; font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;
    color:#000; padding:7px 18px; cursor:pointer;
    border-radius:20px; align-self:flex-start;
    transition:background 0.15s, color 0.15s; margin-top:2px;
  }
  .submit-btn:hover { background:#000; color:#fff; }
  .submit-btn:disabled { opacity:0.4; cursor:not-allowed; }
  .form-msg { font-size:11px; margin-top:8px; color:#555; }
</style>
</head>
<body>

<div id="clock-bg"><canvas id="clock"></canvas></div>

<div class="page">

  <div class="top-brand">
    <div class="brand-icon">Icon.</div>
    <div class="brand-presents">presents</div>
    <div class="brand-fest">Fête de la musique</div>
  </div>
  <div></div>
  <div></div>
  <div class="top-right">Fête de la musique</div>

  <div class="mid-left"><div class="days-left" id="days-left">-- days left</div></div>
  <div class="mid-center"><div class="tagline">Together as one</div></div>
  <div class="mid-counter" id="counter">D-- H-- S--</div>
  <div class="mid-form"><div class="form-guest">You are our special guest.</div></div>

  <div class="bot-left">
    <div class="presents-label"><strong>Icon.</strong> presents</div>
    <div class="fest-name">Fête de la musique</div>
    <ul class="artists">
      <li><a href="https://www.instagram.com/henyanni/"          target="_blank">Hen Yanni</a></li>
      <li><a href="https://www.instagram.com/harrisonfirst/"     target="_blank">Harrison First</a></li>
      <li><a href="https://www.instagram.com/sidsimonsofficial/" target="_blank">Sid Simmons</a></li>
      <li><a href="https://www.instagram.com/kidsreturn_/"       target="_blank">Kids Return</a></li>
    </ul>
  </div>

  <div class="bot-venue">
    <div class="venue-name">FCC Paris</div>
    <div class="venue-addr">21 Rue Étienne Marcel, 75001<br>Paris/France</div>
  </div>

  <div></div>

  <div class="bot-form">
    <div class="form-group"><input type="text"  id="f-name"  placeholder="Name"   autocomplete="off"></div>
    <div class="form-group"><input type="email" id="f-email" placeholder="E-mail" autocomplete="off"></div>
    <div class="form-group"><input type="tel"   id="f-phone" placeholder="Phone"  autocomplete="off"></div>
    <button class="submit-btn" id="submit-btn">Confirmer la présence</button>
    <div class="form-msg" id="form-msg"></div>
  </div>

</div>

<script>
const TARGET = new Date('2026-06-21T14:00:00+02:00');
function pad(n){ return String(Math.max(0,Math.floor(n))).padStart(2,'0'); }
function getDiff(){
  const ms = Math.max(0, TARGET - Date.now()), t = ms/1000;
  return { days:Math.floor(t/86400), hrs:Math.floor((t%86400)/3600), mins:Math.floor((t%3600)/60), secs:Math.floor(t%60) };
}

function updateCounter(){
  const d = getDiff();
  document.getElementById('counter').textContent  = 'D'+pad(d.days)+' H'+pad(d.hrs)+' S'+pad(d.secs);
  document.getElementById('days-left').textContent = d.days+' days left';
}
updateCounter();
setInterval(updateCounter, 1000);

// CLOCK
const canvas = document.getElementById('clock');
const ctx = canvas.getContext('2d');

function sizeCanvas(){
  const sz = Math.min(window.innerWidth, window.innerHeight) * 0.9;
  canvas.width = canvas.height = sz;
}
sizeCanvas();
window.addEventListener('resize', sizeCanvas);

function drawClock(){
  const sz = canvas.width;
  ctx.clearRect(0,0,sz,sz);
  const cx=sz/2, cy=sz/2, outerR=sz*0.46;

  ctx.beginPath();
  ctx.arc(cx,cy,outerR,0,Math.PI*2);
  ctx.strokeStyle='rgba(0,0,0,0.10)';
  ctx.lineWidth=1;
  ctx.stroke();

  for(let i=0;i<60;i++){
    const a=(i/60)*Math.PI*2-Math.PI/2, maj=i%5===0;
    ctx.beginPath();
    ctx.moveTo(cx+Math.cos(a)*outerR*(maj?0.93:0.97), cy+Math.sin(a)*outerR*(maj?0.93:0.97));
    ctx.lineTo(cx+Math.cos(a)*outerR, cy+Math.sin(a)*outerR);
    ctx.strokeStyle=maj?'rgba(0,0,0,0.28)':'rgba(0,0,0,0.09)';
    ctx.lineWidth=maj?1:0.5;
    ctx.stroke();
  }

  const d = getDiff();
  const msNow = Date.now()%1000;
  const secA = ((d.secs+msNow/1000)/60)*Math.PI*2-Math.PI/2;
  const hrA  = ((d.hrs%24)/24+d.mins/1440)*Math.PI*2-Math.PI/2;

  function hand(a,len,w,alpha,tail){
    tail=tail||0;
    ctx.beginPath();
    ctx.moveTo(cx-Math.cos(a)*tail, cy-Math.sin(a)*tail);
    ctx.lineTo(cx+Math.cos(a)*len,  cy+Math.sin(a)*len);
    ctx.strokeStyle='rgba(0,0,0,'+alpha+')';
    ctx.lineWidth=w; ctx.lineCap='round'; ctx.stroke();
  }

  hand(hrA,  outerR*0.60, 1.0, 0.55, outerR*0.05);
  hand(secA, outerR*0.86, 0.7, 1.00, outerR*0.07);

  ctx.beginPath();
  ctx.arc(cx,cy,2.5,0,Math.PI*2);
  ctx.fillStyle='#000'; ctx.fill();
}
drawClock();
setInterval(drawClock, 50);

// FORM
document.getElementById('submit-btn').addEventListener('click', function(){
  const name  = document.getElementById('f-name').value.trim();
  const email = document.getElementById('f-email').value.trim();
  const phone = document.getElementById('f-phone').value.trim();
  const msg   = document.getElementById('form-msg');
  const btn   = document.getElementById('submit-btn');

  if(!name||!email){ msg.textContent='Please fill in name and e-mail.'; msg.style.color='#c00'; return; }

  btn.disabled=true; btn.textContent='Sending…';

  fetch('https://formspree.io/f/xwpbgdqn',{
    method:'POST',
    headers:{'Content-Type':'application/json','Accept':'application/json'},
    body:JSON.stringify({name:name,email:email,phone:phone||'—',_subject:'RSVP — Fête de la musique'})
  })
  .then(r=>r.json())
  .then(data=>{
    if(data.ok||data.next){
      msg.textContent='Présence confirmée — merci !';
      msg.style.color='#555';
      document.getElementById('f-name').value='';
      document.getElementById('f-email').value='';
      document.getElementById('f-phone').value='';
    } else {
      msg.textContent='Erro ao enviar. Tente novamente.';
      msg.style.color='#c00';
    }
    btn.disabled=false; btn.textContent='Confirmer la présence';
  })
  .catch(()=>{
    const body='Name: '+name+'\nE-mail: '+email+'\nPhone: '+phone;
    window.location.href='mailto:rigoni@weareicon.co,contato@weareicon.co?subject=RSVP%20%E2%80%94%20F%C3%AAte%20de%20la%20musique&body='+encodeURIComponent(body);
    btn.disabled=false; btn.textContent='Confirmer la présence';
  });
});
</script>
</body>
</html>
